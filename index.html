<!DOCTYPE html>
<html>
<head>
  <title>VELÔRTE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
    }

    /* SCROLL CONTAINER */
    .container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    /* EACH FRAME */
    .section {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px;
    }

    h1 {
      font-size: 70px;
      margin: 0;
      line-height: 1.1;
    }

    p {
      color: #aaa;
      letter-spacing: 1px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 25px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
    }

    /* HERO */
    .hero {
      flex-direction: column;
      text-align: center;
    }

    /* IMAGE FRAME */
    .image-frame {
      background-size: cover;
      background-position: center;
    }

    /* LEFT TEXT */
    .left {
      position: absolute;
      left: 40px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* PRODUCT SPLIT */
    .product {
      justify-content: space-between;
    }

    .product .text {
      width: 40%;
    }

    .product img {
      width: 300px;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HERO FRAME -->
  <div class="section hero">
    <h1>VELÔRTE</h1>
    <p>A STUDY IN QUIET LUXURY</p>
  </div>

  <!-- IMAGE FRAME -->
  <div class="section image-frame" style="background-image:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f');">
  </div>

  <!-- TEXT FRAME -->
  <div class="section">
    <div class="left">
      <h1>Not made<br>for everyone</h1>
      <p style="margin-top:40px;">VELÔRTE — 2026</p>
    </div>
  </div>

  <!-- PRODUCT FRAME -->
  <div class="section product">
    <div class="text">
      <p>Signature Hoodie</p>
      <h1>₹4,999</h1>
      <a class="btn" href="https://wa.me/919XXXXXXXXX">ORDER</a>
    </div>

    <img src="https://via.placeholder.com/350x450">
  </div>

  <!-- DROP FRAME -->
  <div class="section hero">
    <p>DROP 01</p>
    <h1>Limited</h1>
    <p>No restocks</p>
  </div>

</div>

</body>
</html>
