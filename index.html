<!DOCTYPE html>
<html>
<head>
  <title>VELÔRTE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Luxury Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: 'Playfair Display', serif;
      overflow-x: hidden;
    }

    section {
      height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      padding: 40px;
    }

    h1 {
      font-size: 70px;
      line-height: 1.1;
      margin: 0;
    }

    p {
      color: #aaa;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .hero {
      justify-content: center;
      text-align: center;
      flex-direction: column;
    }

    .hero h1 {
      letter-spacing: 8px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 28px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .image {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
    }

    .left {
      width: 50%;
    }

    .right {
      width: 50%;
      display: flex;
      justify-content: center;
    }

    img {
      width: 300px;
    }

    .fade {
      opacity: 0;
      transform: translateY(40px);
      transition: 1.2s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="fade">
    <h1>VELÔRTE</h1>
    <p>A STUDY IN QUIET LUXURY</p>
    <a href="#look" class="btn">ENTER</a>
  </div>
</section>

<!-- FULL IMAGE -->
<section id="look">
  <div class="image" style="background-image:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f');"></div>
</section>

<!-- STATEMENT -->
<section>
  <div class="fade" style="margin-left:40px;">
    <h1>
      Not made<br>for everyone
    </h1>
    <p style="margin-top:40px;">VELÔRTE — 2026</p>
  </div>
</section>

<!-- PRODUCT (ASYMMETRIC) -->
<section style="justify-content:space-between;">
  
  <div class="left fade">
    <p>Signature Hoodie</p>
    <h1>₹4,999</h1>
    <a class="btn" href="https://wa.me/919XXXXXXXXX">ORDER</a>
  </div>

  <div class="right fade">
    <img src="https://via.placeholder.com/350x450">
  </div>

</section>

<!-- DROP -->
<section class="hero">
  <div class="fade">
    <p>DROP 01</p>
    <h1>Limited</h1>
    <p>No restocks</p>
  </div>
</section>

<script>
  const elements = document.querySelectorAll('.fade');

  function showOnScroll() {
    elements.forEach(el => {
      const top = el.getBoundingClientRect().top;
      if (top < window.innerHeight - 100) {
        el.classList.add('show');
      }
    });
  }

  window.addEventListener('scroll', showOnScroll);
</script>

</body>
</html>
