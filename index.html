<!DOCTYPE html>
<html>
<head>
  <title>VELÔRTE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      background: #0a0a0a;
      color: white;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
    }

    .section {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* FRAME */
    .frame {
      width: 90%;
      height: 85%;
      margin: auto;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* TEXT */
    h1 {
      font-size: 64px;
      margin: 0;
      line-height: 1.1;
    }

    p {
      color: #aaa;
      letter-spacing: 1px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 24px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
    }

    /* IMAGE OVERLAY */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.8));
    }

    /* PRODUCT LAYOUT */
    .product {
      display: flex;
      justify-content: space-between;
      padding: 40px;
    }

    .product img {
      width: 280px;
    }

    /* ANIMATION */
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
    }

    .show .fade-up:nth-child(1) {
      transition: 1s;
      opacity: 1;
      transform: translateY(0);
    }

    .show .fade-up:nth-child(2) {
      transition: 1s 0.3s;
      opacity: 1;
      transform: translateY(0);
    }

    .show .fade-up:nth-child(3) {
      transition: 1s 0.6s;
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="section">
    <div class="frame show">
      <div style="text-align:center;">
        <h1 class="fade-up">VELÔRTE</h1>
        <p class="fade-up">A STUDY IN QUIET LUXURY</p>
      </div>
    </div>
  </div>

  <!-- IMAGE -->
  <div class="section">
    <div class="frame" style="background:url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f') center/cover;">
      <div class="overlay"></div>
    </div>
  </div>

  <!-- STATEMENT -->
  <div class="section">
    <div class="frame show" style="align-items:flex-start; padding-left:40px;">
      <div>
        <h1 class="fade-up">Not made<br>for everyone</h1>
        <p class="fade-up" style="margin-top:40px;">VELÔRTE — 2026</p>
      </div>
    </div>
  </div>

  <!-- PRODUCT -->
  <div class="section">
    <div class="frame product show">

      <div>
        <p class="fade-up">Signature Hoodie</p>
        <h1 class="fade-up">₹4,999</h1>
        <a class="btn fade-up" href="https://wa.me/919XXXXXXXXX">ORDER</a>
      </div>

      <img src="https://via.placeholder.com/350x450">

    </div>
  </div>

  <!-- DROP -->
  <div class="section">
    <div class="frame show" style="text-align:center;">
      <div>
        <p class="fade-up">DROP 01</p>
        <h1 class="fade-up">Limited</h1>
        <p class="fade-up">No restocks</p>
      </div>
    </div>
  </div>

</div>

</body>
</html>
