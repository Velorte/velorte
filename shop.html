<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop | VELÔRTE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <nav>
      <h1>VELÔRTE</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="#" id="signin-btn" class="signin-link">Sign In</a></li>
      </ul>
    </nav>
  </header>

  <div id="signin-modal" class="modal">
    <div class="modal-content">
      <span class="close-btn" id="close-modal">&times;</span>
      <h2>Sign In</h2>
      <form id="login-form">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>
    </div>
  </div>

  <section class="shop-header">
    <h2>All Products</h2>
    <p>Curated luxury streetwear</p>
  </section>

  <!-- WORKING FILTERS -->
  <div class="shop-filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="hoodies">Hoodies</button>
    <button class="filter-btn" data-filter="tees">Tees</button>
    <button class="filter-btn" data-filter="jackets">Jackets</button>
    <button class="filter-btn" data-filter="bottoms">Bottoms</button>
    <button class="filter-btn" data-filter="accessories">Accessories</button>
  </div>

  <div class="shop-grid" id="shop-products">
    <!-- Products loaded by JavaScript -->
  </div>

  <div class="no-results" id="no-results" style="display: none;">
    <p>No products found in this category.</p>
    <a href="shop.html" class="btn">View All Products</a>
  </div>

  <footer>
    <div class="footer-content">
      <h3>VELÔRTE</h3>
      <p>Luxury streetwear for the modern era</p>
      <div class="social-links">
        <a href="https://www.instagram.com/velorteclothing.in?igsh=MXNtbHY0OXU2MHV0OQ==" target="_blank" class="social-link">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
          </svg>
          <span>@velorteclothing.in</span>
        </a>
        <a href="https://pin.it/4Om5RYKiP" target="_blank" class="social-link">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4"></path>
          </svg>
          <span>@velorte</span>
        </a>
      </div>
      <p class="copyright">&copy; 2026 Velôrte. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // Shop page filtering
    const shopProducts = document.getElementById('shop-products');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const noResults = document.getElementById('no-results');
    
    // All 8 products with categories
    const allProducts = [
      { id: 1, name: "Signature Hoodie", price: "$149.00", category: "hoodies", image: "https://via.placeholder.com/300x400/1a1a1a/ffffff?text=Signature+Hoodie" },
      { id: 2, name: "Street Essential Tee", price: "$89.00", category: "tees", image: "https://via.placeholder.com/300x400/2d2d2d/ffffff?text=Street+Essential+Tee" },
      { id: 3, name: "Luxury Varsity Jacket", price: "$299.00", category: "jackets", image: "https://via.placeholder.com/300x400/1a1a1a/ffffff?text=Luxury+Varsity+Jacket" },
      { id: 4, name: "Old Money Trousers", price: "$179.00", category: "bottoms", image: "https://via.placeholder.com/300x400/2d2d2d/ffffff?text=Old+Money+Trousers" },
      { id: 5, name: "Velorte Cap", price: "$59.00", category: "accessories", image: "https://via.placeholder.com/300x400/1a1a1a/ffffff?text=Velorte+Cap" },
      { id: 6, name: "Essential Sweatpants", price: "$129.00", category: "bottoms", image: "https://via.placeholder.com/300x400/2d2d2d/ffffff?text=Essential+Sweatpants" },
      { id: 7, name: "Premium Beanie", price: "$49.00", category: "accessories", image: "https://via.placeholder.com/300x400/1a1a1a/ffffff?text=Premium+Beanie" },
      { id: 8, name: "Oversized Tee", price: "$79.00", category: "tees", image: "https://via.placeholder.com/300x400/2d2d2d/ffffff?text=Oversized+Tee" }
    ];
    
    function displayProducts(filter = 'all') {
      shopProducts.innerHTML = '';
      
      const filtered = filter === 'all' 
        ? allProducts 
        : allProducts.filter(p => p.category === filter);
      
      if (filtered.length === 0) {
        noResults.style.display = 'block';
      } else {
        noResults.style.display = 'none';
        filtered.forEach(product => {
          shopProducts.innerHTML += `
            <div class="product-card" data-category="${product.category}">
              <a href="product-detail.html?id=${product.id}" class="product-link">
                <img src="${product.image}" alt="${product.name}">
                <h3>${product.name}</h3>
                <p class="price">${product.price}</p>
              </a>
            </div>
          `;
        });
      }
    }
    
    // Filter button clicks
    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        displayProducts(btn.dataset.filter);
      });
    });
    
    // Check URL for category parameter
    const urlParams = new URLSearchParams(window.location.search);
    const categoryParam = urlParams.get('category');
    if (categoryParam) {
      const targetBtn = document.querySelector(`[data-filter="${categoryParam}"]`);
      if (targetBtn) {
        filterBtns.forEach(b => b.classList.remove('active'));
        targetBtn.classList.add('active');
        displayProducts(categoryParam);
      } else {
        displayProducts('all');
      }
    } else {
      displayProducts('all');
    }
  </script>
</body>
</html>
