<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact | VELÔRTE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
  <header>
    <nav>
      <h1>VELÔRTE</h1>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="javascript:void(0)" id="signin-btn" class="signin-link">Sign In</a></li>
      </ul>
    </nav>
  </header>

  <div id="signin-modal" class="modal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2>Sign In</h2>
      <form id="login-form" onsubmit="handleLogin(event)">
        <label>Email</label>
        <input type="email" id="email" required placeholder="your@email.com">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
        <button type="submit" class="btn-submit">Sign In</button>
      </form>
    </div>
  </div>

  <section style="padding-top: 120px; text-align: center;">
    <h2 style="font-size: 2.5rem; letter-spacing: 4px;">Get in Touch</h2>
  </section>

  <div style="max-width: 500px; margin: 3rem auto; padding: 2rem; background: rgba(255,255,255,0.03); border-radius: 12px;">
    <p style="color: #888; margin-bottom: 1.5rem;">Email: support@velorte.com</p>
    <p style="color: #888; margin-bottom: 1.5rem;">Instagram: @velorteclothing.in</p>
    <form onsubmit="event.preventDefault(); alert('Message sent!'); this.reset();">
      <input type="text" placeholder="Name" style="width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px;">
      <input type="email" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px;">
      <textarea placeholder="Message" style="width: 100%; padding: 12px; margin-bottom: 1rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 6px; min-height: 100px;"></textarea>
      <button type="submit" class="btn-submit" style="width: 100%;">Send</button>
    </form>
  </div>

  <footer>
    <div class="footer-content">
      <h3>VELÔRTE</h3>
      <p>&copy; 2026 Velôrte</p>
    </div>
  </footer>

  <script src="script.js?v=3"></script>
</body>
</html>
